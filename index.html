<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Riel Scanner</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --primary:#0057ff;--primary-dark:#003dc2;
      --success:#00c853;--danger:#ff1744;--warning:#ff9100;
      --bg:#0a0a1a;--surface:#12122a;--surface2:#1e1e3f;
      --text:#f0f0ff;--muted:#8888aa;--radius:16px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--text);min-height:100vh;
         display:flex;flex-direction:column;align-items:center;padding:16px 16px 60px}

    .header{width:100%;max-width:500px;display:flex;align-items:center;
            justify-content:space-between;margin-bottom:12px}
    .header h1{font-size:22px;font-weight:900}
    .header h1 span{color:var(--primary)}
    .btn-hist{background:var(--surface);border:none;color:var(--text);
              padding:10px 14px;border-radius:10px;font-size:18px;cursor:pointer}

    /* CAMARA */
    .cam-wrap{width:100%;max-width:500px;position:relative;
              border-radius:var(--radius);overflow:hidden;
              background:#000;border:2px solid var(--surface2);
              margin-bottom:12px;transition:border-color .3s}
    .cam-wrap.flash{border-color:var(--success)!important}
    #video{width:100%;display:block;max-height:280px;object-fit:cover}
    .aim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .aim-box{width:75%;height:70px;border:2px solid rgba(255,255,255,.8);border-radius:6px;
             box-shadow:0 0 0 2000px rgba(0,0,0,.35)}
    .aim-corner{position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid}
    .aim-tl{top:0;left:0;border-width:3px 0 0 3px}
    .aim-tr{top:0;right:0;border-width:3px 3px 0 0}
    .aim-bl{bottom:0;left:0;border-width:0 0 3px 3px}
    .aim-br{bottom:0;right:0;border-width:0 3px 3px 0}
    .scan-anim{position:absolute;left:12%;right:12%;height:2px;
               background:linear-gradient(90deg,transparent,var(--primary),transparent);
               animation:sweep 1.8s ease-in-out infinite;top:50%;display:none}
    .scanning .scan-anim{display:block}
    @keyframes sweep{0%,100%{top:20%;opacity:.8}50%{top:80%;opacity:1}}

    .cam-btns{width:100%;max-width:500px;display:flex;gap:10px;margin-bottom:12px}
    .btn-cam{flex:1;padding:13px;border:none;border-radius:12px;
             font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
    .btn-start{background:var(--primary);color:#fff}
    .btn-start:disabled{background:#333355;cursor:not-allowed}
    .btn-stop{background:var(--surface2);color:var(--text)}
    .btn-stop:disabled{opacity:.35;cursor:not-allowed}

    /* MANUAL */
    .manual-wrap{width:100%;max-width:500px;display:flex;gap:10px;margin-bottom:18px}
    .manual-input{flex:1;background:var(--surface);border:2px solid var(--surface2);
                  border-radius:12px;color:var(--text);font-size:16px;font-weight:600;
                  padding:12px 14px;outline:none}
    .manual-input:focus{border-color:var(--primary)}
    .manual-input::placeholder{color:var(--muted);font-size:13px;font-weight:400}
    .btn-ok{background:var(--primary);color:#fff;border:none;border-radius:12px;
            padding:12px 20px;font-size:15px;font-weight:800;cursor:pointer}

    /* LOADING */
    .loading{width:100%;max-width:500px;display:flex;align-items:center;
             justify-content:center;gap:12px;padding:16px;color:var(--muted);font-size:15px}
    .loading.hidden{display:none}
    .spinner{width:20px;height:20px;border:3px solid var(--surface2);
             border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* RESULTADO */
    .result-card{width:100%;max-width:500px;border-radius:var(--radius);
                 padding:20px;border:2px solid var(--success);
                 background:rgba(0,200,83,.07);animation:slideIn .3s ease;margin-bottom:16px}
    .result-card.error  {border-color:var(--danger);background:rgba(255,23,68,.07)}
    .result-card.warning{border-color:var(--warning);background:rgba(255,145,0,.07)}
    .result-card.hidden{display:none}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .res-cliente{font-size:22px;font-weight:900;line-height:1.2;flex:1}
    .res-badge{font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;
               background:var(--success);color:#000;white-space:nowrap;margin-left:8px;flex-shrink:0}
    .res-badge.error  {background:var(--danger);color:#fff}
    .res-badge.warning{background:var(--warning);color:#000}
    .res-meta{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.8}
    .prod-label{font-size:11px;font-weight:700;text-transform:uppercase;
                letter-spacing:1px;color:var(--muted);margin-bottom:8px}
    .prod-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .prod-list li{background:var(--surface2);border-radius:10px;padding:11px 13px;
                  font-size:15px;display:flex;justify-content:space-between;align-items:center}
    .prod-cod{font-size:11px;color:var(--muted);margin-right:5px}
    .prod-qty{background:var(--primary);color:#fff;border-radius:6px;
              padding:2px 10px;font-size:13px;font-weight:700;flex-shrink:0}
    .res-time{margin-top:10px;font-size:12px;color:var(--muted);text-align:right}

    /* STATS */
    .stats-bar{width:100%;max-width:500px;display:flex;gap:10px;margin-bottom:16px}
    .stat{flex:1;background:var(--surface);border-radius:12px;padding:12px;
          text-align:center;border:2px solid var(--surface2)}
    .stat-n{display:block;font-size:26px;font-weight:900;color:var(--primary)}
    .stat-l{font-size:11px;color:var(--muted);font-weight:600}

    /* HISTORIAL */
    .hist-wrap{width:100%;max-width:500px;display:none}
    .hist-wrap.open{display:block}
    .hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .hist-hdr h2{font-size:17px;font-weight:800}
    .btn-cls{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer}
    .hist-list{display:flex;flex-direction:column;gap:8px}
    .hi{background:var(--surface);border-radius:var(--radius);
        padding:13px 15px;border-left:4px solid var(--primary)}
    .hi-top{display:flex;justify-content:space-between;margin-bottom:4px}
    .hi-cli{font-weight:800;font-size:15px}
    .hi-t{font-size:12px;color:var(--muted)}
    .hi-m{font-size:13px;color:var(--muted);margin-top:2px}
    .empty{text-align:center;color:var(--muted);padding:40px 0}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
           padding:12px 24px;border-radius:30px;font-weight:700;font-size:15px;
           z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tin .25s ease;white-space:nowrap}
    .toast.hidden{display:none}
    .toast.success{background:var(--success);color:#000}
    .toast.error  {background:var(--danger);color:#fff}
    .toast.warning{background:var(--warning);color:#000}
    @keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px)}
                   to  {opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>
</head>
<body>

<div class="header">
  <h1>🏭 Riel <span>Scanner</span></h1>
  <button class="btn-hist" onclick="toggleHistory()">📋</button>
</div>

<!-- CAMARA -->
<div class="cam-wrap" id="cam-wrap">
  <video id="video" playsinline muted autoplay></video>
  <div class="aim">
    <div class="aim-box">
      <div class="aim-corner aim-tl"></div>
      <div class="aim-corner aim-tr"></div>
      <div class="aim-corner aim-bl"></div>
      <div class="aim-corner aim-br"></div>
    </div>
  </div>
  <div class="scan-anim" id="scan-anim"></div>
</div>

<div class="cam-btns">
  <button class="btn-cam btn-start" id="btn-start" onclick="startCamera()">📷 Activar cámara</button>
  <button class="btn-cam btn-stop"  id="btn-stop"  onclick="stopCamera()" disabled>⏹ Detener</button>
</div>

<!-- MANUAL -->
<div class="manual-wrap">
  <input type="text" id="manual-input" class="manual-input"
         placeholder="O escribí el código acá..." autocomplete="off"/>
  <button class="btn-ok" onclick="manualScan()">OK</button>
</div>

<div class="loading hidden" id="loading">
  <div class="spinner"></div> Buscando...
</div>

<div id="result-card" class="result-card hidden">
  <div class="result-top">
    <div class="res-cliente" id="res-cliente"></div>
    <div class="res-badge"   id="res-badge"></div>
  </div>
  <div class="res-meta" id="res-meta"></div>
  <div class="prod-label">Productos</div>
  <ul class="prod-list" id="res-products"></ul>
  <div class="res-time" id="res-time"></div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-n" id="stat-hoy">0</span><span class="stat-l">Hoy</span></div>
  <div class="stat"><span class="stat-n" id="stat-ult">—</span><span class="stat-l">Último</span></div>
</div>

<div class="hist-wrap" id="hist-wrap">
  <div class="hist-hdr">
    <h2>📋 Historial</h2>
    <button class="btn-cls" onclick="toggleHistory()">✕</button>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const SUPA_URL = 'https://aylfgwyoxvplfegshewv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5bGZnd3lveHZwbGZlZ3NoZXd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NTQ0MzYsImV4cCI6MjEwMDMzMDQzNn0.MMjgt35jrLB4tdTGIFqTvbzqniyQ1C4EGghAiokipfA';
const SCAN_KEY = 'riel_v4';

// ── CÁMARA ────────────────────────────────────────────────
let stream    = null;
let detecting = false;
let lastCode  = '';
let lastTs    = 0;
const DEBOUNCE = 2500;

async function startCamera() {
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  document.getElementById('cam-wrap').classList.add('scanning');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    detecting = true;
    detectLoop();
  } catch(e) {
    resetCam();
    showToast('Sin acceso a la cámara', 'error');
  }
}

async function detectLoop() {
  if (!detecting) return;

  const video = document.getElementById('video');
  if (!video.videoWidth) { setTimeout(detectLoop, 200); return; }

  // Usar BarcodeDetector nativo (iOS 17+, Android Chrome)
  if ('BarcodeDetector' in window) {
    const bd = new BarcodeDetector({
      formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','codabar','code_93']
    });
    const loop = async () => {
      if (!detecting) return;
      try {
        const codes = await bd.detect(video);
        if (codes.length > 0) {
          const code = codes[0].rawValue;
          const now  = Date.now();
          if (code !== lastCode || (now - lastTs) > DEBOUNCE) {
            lastCode = code; lastTs = now;
            flash(); vibrate([60]);
            processScan(code);
          }
        }
      } catch {}
      setTimeout(loop, 150);
    };
    loop();
  } else {
    // Fallback: ZXing via canvas
    loadZxingAndStart(video);
  }
}

function loadZxingAndStart(video) {
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
  s.onload = () => {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.ITF,
    ]);
    const reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');

    const loop = () => {
      if (!detecting) return;
      try {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const lum = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const bin = new ZXing.HybridBinarizer(lum);
        const bmp = new ZXing.BinaryBitmap(bin);
        const res = reader.decode(bmp);
        const code = res.getText();
        const now  = Date.now();
        if (code !== lastCode || (now - lastTs) > DEBOUNCE) {
          lastCode = code; lastTs = now;
          flash(); vibrate([60]);
          processScan(code);
        }
      } catch {}
      setTimeout(loop, 200);
    };
    loop();
  };
  document.head.appendChild(s);
}

function flash() {
  const w = document.getElementById('cam-wrap');
  w.style.borderColor = 'var(--success)';
  setTimeout(() => w.style.borderColor = 'var(--surface2)', 600);
}

function stopCamera() {
  detecting = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('video');
  video.srcObject = null;
  resetCam();
}

function resetCam() {
  detecting = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  document.getElementById('cam-wrap').classList.remove('scanning');
}

// ── MANUAL ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('manual-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); manualScan(); }
  });
  updateStats();
});

function manualScan() {
  const inp  = document.getElementById('manual-input');
  const code = inp.value.trim();
  if (!code) { showToast('Ingresá un código', 'error'); return; }
  inp.value = ''; processScan(code);
}

// ── ESCANEO ───────────────────────────────────────────────
async function processScan(code) {
  setLoading(true);
  document.getElementById('result-card').classList.add('hidden');
  let pedido;
  try { pedido = await buscarPedido(code); }
  catch(e) {
    setLoading(false);
    showResult({tipo:'error',cliente:code,badge:'❌ Sin conexión',meta:'',productos:[]});
    showToast('Error de red','error'); return;
  }
  setLoading(false);
  if (!pedido) {
    vibrate([200,100,200]);
    showResult({tipo:'error',cliente:code,badge:'❌ No encontrado',meta:'El código no está en la base de pedidos',productos:[]});
    showToast('No encontrado','error'); return;
  }
  const dup = wasScannedToday(code);
  saveEscaneo(code, pedido); updateStats();
  showResult({
    tipo: dup?'warning':'ok',
    cliente: pedido.cliente||pedido.nroFactura,
    badge: dup?'⚠️ Ya escaneado':'✅ Registrado',
    meta: [pedido.factura&&`Fact. ${pedido.factura}`,
           pedido.nroFactura&&`Nº ${pedido.nroFactura}`,
           pedido.ruta&&`Ruta ${pedido.ruta}`,
           pedido.zona&&`Zona ${pedido.zona}`].filter(Boolean).join(' · '),
    productos: pedido.productos,
  });
  dup ? (vibrate([50,50,50]),showToast('⚠️ Ya escaneado','warning'))
      : (vibrate([80]),      showToast('✅ Registrado','success'));
}

// ── SUPABASE ──────────────────────────────────────────────
async function buscarPedido(codigo) {
  const intentos = [
    `pedidos?codigo_barras=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?nro_factura=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?cliente=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?negocio=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?ord_compra=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?planilla=eq.${enc(codigo)}&select=*&limit=1`,
  ];
  let fila = null;
  for (const q of intentos) {
    const r = await supaGet(q);
    if (r && r.length) { fila = r[0]; break; }
  }
  if (!fila) return null;
  const todo = await supaGet(`pedidos?nro_factura=eq.${enc(fila.nro_factura)}&select=*`);
  return buildPedido(todo.length ? todo : [fila]);
}

function buildPedido(rows) {
  if (!rows||!rows.length) return null;
  const b = rows[0];
  return {
    nroFactura: b.nro_factura,
    factura:    b.factura,
    cliente:    b.cliente || b.negocio || b.nro_factura,
    ruta:       b.ruta_cliente || b.ruta,
    zona:       b.zona,
    productos:  rows.map(r=>({codProducto:r.cod_producto,nombre:r.producto,cantidad:r.cantidad})),
  };
}

async function supaGet(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`,{
    headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
  });
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
function enc(s){return encodeURIComponent(s)}

// ── UI ────────────────────────────────────────────────────
function setLoading(on){document.getElementById('loading').classList.toggle('hidden',!on)}

function showResult({tipo,cliente,badge,meta,productos}){
  const card=document.getElementById('result-card');
  card.className='result-card'+(tipo==='error'?' error':tipo==='warning'?' warning':'');
  document.getElementById('res-cliente').textContent=cliente;
  const b=document.getElementById('res-badge');
  b.textContent=badge;
  b.className='res-badge'+(tipo==='error'?' error':tipo==='warning'?' warning':'');
  document.getElementById('res-meta').textContent=meta;
  const list=document.getElementById('res-products');
  list.innerHTML='';
  if(!productos||!productos.length){
    list.innerHTML='<li style="color:var(--muted)">Sin productos</li>';
  } else {
    productos.forEach(p=>{
      const li=document.createElement('li');
      li.innerHTML=`<span><span class="prod-cod">[${p.codProducto||''}]</span>${p.nombre}</span><span class="prod-qty">x${p.cantidad}</span>`;
      list.appendChild(li);
    });
  }
  document.getElementById('res-time').textContent=
    new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  card.classList.remove('hidden');
}

// ── STORAGE ───────────────────────────────────────────────
function loadE(){try{return JSON.parse(localStorage.getItem(SCAN_KEY)||'[]')}catch{return[]}}
function saveEscaneo(code,p){
  const arr=loadE();
  arr.unshift({id:Date.now(),code,nroFactura:p.nroFactura,factura:p.factura,
    cliente:p.cliente,ruta:p.ruta,zona:p.zona,productos:p.productos,
    timestamp:new Date().toISOString()});
  localStorage.setItem(SCAN_KEY,JSON.stringify(arr.slice(0,500)));
}
function wasScannedToday(code){
  return loadE().some(r=>r.code===code&&r.timestamp.startsWith(todayStr()));
}
function updateStats(){
  const hoy=loadE().filter(r=>r.timestamp.startsWith(todayStr()));
  document.getElementById('stat-hoy').textContent=hoy.length;
  document.getElementById('stat-ult').textContent=hoy.length?(hoy[0].cliente||'—').substring(0,12):'—';
}

// ── HISTORIAL ─────────────────────────────────────────────
function toggleHistory(){
  const w=document.getElementById('hist-wrap');
  if(w.classList.toggle('open')) renderHistory();
}
function renderHistory(){
  const data=loadE().filter(r=>r.timestamp.startsWith(todayStr()));
  const list=document.getElementById('hist-list');
  if(!data.length){list.innerHTML='<div class="empty">📭 Sin escaneos hoy</div>';return}
  list.innerHTML=data.map(r=>`
    <div class="hi">
      <div class="hi-top"><span class="hi-cli">${r.cliente||r.nroFactura}</span><span class="hi-t">${fmtTime(r.timestamp)}</span></div>
      <div class="hi-m">Nº ${r.nroFactura||''} · ${r.ruta||''}</div>
      <div class="hi-m">${(r.productos||[]).map(p=>`${p.nombre} x${p.cantidad}`).join(' · ')}</div>
    </div>`).join('');
}

// ── UTILS ─────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtTime(iso){return new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p)}catch{}}
let _tt;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type}`;
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('hidden'),2800);
}
</script>
</body>
</html>

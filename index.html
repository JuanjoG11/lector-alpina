<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Riel Scanner</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--primary:#0057ff;--primary-dark:#003dc2;--success:#00c853;--danger:#ff1744;
          --warning:#ff9100;--bg:#0a0a1a;--surface:#12122a;--surface2:#1e1e3f;
          --text:#f0f0ff;--muted:#8888aa;--radius:16px}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--text);min-height:100vh;
         display:flex;flex-direction:column;align-items:center;padding:14px 14px 60px}
    .header{width:100%;max-width:500px;display:flex;align-items:center;
            justify-content:space-between;margin-bottom:12px}
    .header h1{font-size:21px;font-weight:900}
    .header h1 span{color:var(--primary)}
    .hbtns{display:flex;gap:8px}
    .btn-ico{background:var(--surface);border:none;color:var(--text);
             padding:9px 13px;border-radius:10px;font-size:17px;cursor:pointer}
    /* CAMARA */
    .cam-wrap{width:100%;max-width:500px;position:relative;border-radius:var(--radius);
              overflow:hidden;background:#000;border:2px solid var(--surface2);
              margin-bottom:10px;transition:border-color .3s}
    .cam-wrap.flash{border-color:var(--success)!important}
    #video{width:100%;display:block;max-height:260px;object-fit:cover}
    .aim{position:absolute;inset:0;display:flex;align-items:center;
         justify-content:center;pointer-events:none}
    .aim-box{width:78%;height:68px;border:2px solid rgba(255,255,255,.75);border-radius:6px;
             box-shadow:0 0 0 2000px rgba(0,0,0,.32);position:relative}
    .c{position:absolute;width:18px;height:18px;border-color:#fff;border-style:solid}
    .c.tl{top:-1px;left:-1px;border-width:3px 0 0 3px}
    .c.tr{top:-1px;right:-1px;border-width:3px 3px 0 0}
    .c.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px}
    .c.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0}
    .scan-line{position:absolute;left:11%;right:11%;height:2px;
               background:linear-gradient(90deg,transparent,var(--primary),transparent);
               animation:sweep 1.8s ease-in-out infinite;display:none}
    .scanning .scan-line{display:block}
    @keyframes sweep{0%,100%{top:18%}50%{top:80%}}
    .cam-btns{width:100%;max-width:500px;display:flex;gap:8px;margin-bottom:10px}
    .btn-cam{flex:1;padding:13px;border:none;border-radius:12px;
             font-size:14px;font-weight:700;cursor:pointer}
    .btn-start{background:var(--primary);color:#fff}
    .btn-start:disabled{background:#333355;cursor:not-allowed}
    .btn-stop{background:var(--surface2);color:var(--text)}
    .btn-stop:disabled{opacity:.35;cursor:not-allowed}
    /* MANUAL */
    .manual-wrap{width:100%;max-width:500px;display:flex;gap:8px;margin-bottom:16px}
    .manual-input{flex:1;background:var(--surface);border:2px solid var(--surface2);
                  border-radius:12px;color:var(--text);font-size:16px;font-weight:600;
                  padding:12px 14px;outline:none}
    .manual-input:focus{border-color:var(--primary)}
    .manual-input::placeholder{color:var(--muted);font-size:13px;font-weight:400}
    .btn-ok{background:var(--primary);color:#fff;border:none;border-radius:12px;
            padding:12px 20px;font-size:15px;font-weight:800;cursor:pointer}
    /* LOADING */
    .loading{width:100%;max-width:500px;display:flex;align-items:center;
             justify-content:center;gap:10px;padding:14px;color:var(--muted);font-size:14px}
    .loading.hidden{display:none}
    .spinner{width:20px;height:20px;border:3px solid var(--surface2);
             border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* RESULTADO */
    .result-card{width:100%;max-width:500px;border-radius:var(--radius);
                 padding:18px;border:2px solid var(--success);
                 background:rgba(0,200,83,.07);animation:slideIn .3s ease;margin-bottom:14px}
    .result-card.error  {border-color:var(--danger);background:rgba(255,23,68,.07)}
    .result-card.warning{border-color:var(--warning);background:rgba(255,145,0,.07)}
    .result-card.hidden{display:none}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
    .res-cliente{font-size:21px;font-weight:900;line-height:1.2;flex:1}
    .res-badge{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;
               background:var(--success);color:#000;white-space:nowrap;margin-left:8px;flex-shrink:0}
    .res-badge.error  {background:var(--danger);color:#fff}
    .res-badge.warning{background:var(--warning);color:#000}
    .res-meta{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.8}
    .prod-label{font-size:11px;font-weight:700;text-transform:uppercase;
                letter-spacing:1px;color:var(--muted);margin-bottom:8px}
    /* CHECKLIST PRODUCTOS */
    .prod-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .prod-item{background:var(--surface2);border-radius:10px;padding:11px 13px;
               display:flex;align-items:center;gap:10px;transition:.2s;cursor:pointer}
    .prod-item.done{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3)}
    .prod-item.done .prod-name{text-decoration:line-through;color:var(--muted)}
    .chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);
         display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:14px}
    .prod-item.done .chk{background:var(--success);border-color:var(--success);color:#000}
    .prod-info{flex:1;min-width:0}
    .prod-name{font-size:14px;font-weight:600}
    .prod-cod{font-size:11px;color:var(--muted)}
    .prod-qty{background:var(--primary);color:#fff;border-radius:6px;
              padding:2px 9px;font-size:12px;font-weight:700;flex-shrink:0}
    .prod-item.done .prod-qty{background:var(--success);color:#000}
    .prog-pedido{margin-top:10px;display:flex;align-items:center;gap:8px}
    .prog-bar-wrap{flex:1;background:var(--surface2);border-radius:20px;height:6px;overflow:hidden}
    .prog-bar-fill{height:100%;background:var(--success);border-radius:20px;transition:width .4s}
    .prog-txt{font-size:12px;color:var(--muted);white-space:nowrap}
    .res-time{margin-top:8px;font-size:11px;color:var(--muted);text-align:right}
    /* STATS */
    .stats-bar{width:100%;max-width:500px;display:flex;gap:8px;margin-bottom:14px}
    .stat{flex:1;background:var(--surface);border-radius:12px;padding:11px;
          text-align:center;border:2px solid var(--surface2)}
    .stat-n{display:block;font-size:24px;font-weight:900;color:var(--primary)}
    .stat-l{font-size:10px;color:var(--muted);font-weight:600}
    /* HISTORIAL */
    .hist-wrap{width:100%;max-width:500px;display:none}
    .hist-wrap.open{display:block}
    .hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .hist-hdr h2{font-size:16px;font-weight:800}
    .btn-cls{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer}
    .hist-list{display:flex;flex-direction:column;gap:8px}
    .hi{background:var(--surface);border-radius:var(--radius);
        padding:12px 14px;border-left:4px solid var(--primary)}
    .hi.hi-done{border-left-color:var(--success)}
    .hi-top{display:flex;justify-content:space-between;margin-bottom:3px}
    .hi-cli{font-weight:800;font-size:14px}
    .hi-t{font-size:11px;color:var(--muted)}
    .hi-m{font-size:12px;color:var(--muted);margin-top:2px}
    .empty{text-align:center;color:var(--muted);padding:36px 0}
    /* TOAST */
    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
           padding:11px 22px;border-radius:30px;font-weight:700;font-size:14px;
           z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tin .25s ease;white-space:nowrap}
    .toast.hidden{display:none}
    .toast.success{background:var(--success);color:#000}
    .toast.error  {background:var(--danger);color:#fff}
    .toast.warning{background:var(--warning);color:#000}
    @keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px)}
                   to  {opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>
</head>
<body>
<div class="header">
  <h1>🏭 Riel <span>Scanner</span></h1>
  <div class="hbtns">
    <button class="btn-ico" onclick="toggleHistory()" title="Historial">📋</button>
    <a href="/uploader.html" style="text-decoration:none">
      <button class="btn-ico" title="Subir Excel">📤</button>
    </a>
  </div>
</div>
<div class="cam-wrap" id="cam-wrap">
  <video id="video" playsinline muted autoplay></video>
  <div class="aim">
    <div class="aim-box">
      <div class="c tl"></div><div class="c tr"></div>
      <div class="c bl"></div><div class="c br"></div>
    </div>
  </div>
  <div class="scan-line" id="scan-line"></div>
</div>
<div class="cam-btns">
  <button class="btn-cam btn-start" id="btn-start" onclick="startCamera()">📷 Activar cámara</button>
  <button class="btn-cam btn-stop"  id="btn-stop"  onclick="stopCamera()" disabled>⏹ Detener</button>
</div>
<div class="manual-wrap">
  <input type="text" id="manual-input" class="manual-input"
         placeholder="O escribí el código acá..." autocomplete="off"/>
  <button class="btn-ok" onclick="manualScan()">OK</button>
</div>
<div class="loading hidden" id="loading"><div class="spinner"></div> Buscando...</div>
<div id="result-card" class="result-card hidden">
  <div class="result-top">
    <div class="res-cliente" id="res-cliente"></div>
    <div class="res-badge"   id="res-badge"></div>
  </div>
  <div class="res-meta" id="res-meta"></div>
  <div class="prod-label">Productos — tocá para marcar separado</div>
  <ul class="prod-list" id="res-products"></ul>
  <div class="prog-pedido">
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0"></div></div>
    <span class="prog-txt" id="prog-txt">0/0</span>
  </div>
  <div class="res-time" id="res-time"></div>
</div>
<div class="stats-bar">
  <div class="stat"><span class="stat-n" id="stat-hoy">0</span><span class="stat-l">Hoy</span></div>
  <div class="stat"><span class="stat-n" id="stat-ult">—</span><span class="stat-l">Último</span></div>
</div>
<div class="hist-wrap" id="hist-wrap">
  <div class="hist-hdr">
    <h2>📋 Historial</h2>
    <button class="btn-cls" onclick="toggleHistory()">✕</button>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>
<div id="toast" class="toast hidden"></div>
<script>
const SUPA_URL = 'https://aylfgwyoxvplfegshewv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5bGZnd3lveHZwbGZlZ3NoZXd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NTQ0MzYsImV4cCI6MjEwMDMzMDQzNn0.MMjgt35jrLB4tdTGIFqTvbzqniyQ1C4EGghAiokipfA';
const SCAN_KEY = 'riel_v5';

// ── CÁMARA ─────────────────────────────────────────────
let stream=null,detecting=false,lastCode='',lastTs=0;
const DEB=2500;

async function startCamera(){
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-stop').disabled=false;
  document.getElementById('cam-wrap').classList.add('scanning');
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    const v=document.getElementById('video');
    v.srcObject=stream; await v.play();
    detecting=true; detectLoop();
  }catch(e){ resetCam(); showToast('Sin acceso a la cámara','error'); }
}

async function detectLoop(){
  if(!detecting) return;
  const v=document.getElementById('video');
  if(!v.videoWidth){setTimeout(detectLoop,200);return}
  if('BarcodeDetector' in window){
    const bd=new BarcodeDetector({
      formats:['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','codabar','code_93']
    });
    const loop=async()=>{
      if(!detecting) return;
      try{
        const codes=await bd.detect(v);
        if(codes.length){
          // Solo aceptar EAN-13 (13 dígitos) o códigos largos ≥10 chars
          // Filtrar el más largo primero
          const valid=codes
            .map(c=>c.rawValue)
            .filter(c=>/^\d{10,}$/.test(c))  // solo numérico de 10+ dígitos
            .sort((a,b)=>b.length-a.length);
          if(!valid.length){setTimeout(loop,150);return;}
          const code=valid[0];
            const now=Date.now();
            if(code!==lastCode||(now-lastTs)>DEB){
              lastCode=code;lastTs=now;
              flash();vibrate([60]);processScan(code);
            }
          }
        }catch{}
      setTimeout(loop,150);
    };loop();
  } else {
    // Fallback ZXing
    const s=document.createElement('script');
    s.src='https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    s.onload=()=>{
      const hints=new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
        ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.UPC_A
      ]);
      const reader=new ZXing.MultiFormatReader();reader.setHints(hints);
      const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
      const loop=()=>{
        if(!detecting) return;
        try{
          canvas.width=v.videoWidth;canvas.height=v.videoHeight;
          ctx.drawImage(v,0,0);
          const lum=new ZXing.HTMLCanvasElementLuminanceSource(canvas);
          const res=new ZXing.MultiFormatReader().decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum)));
          const code=res.getText();
          if(!/^\d{10,}$/.test(code)){setTimeout(loop,200);return;}
            const now=Date.now();
            if(code!==lastCode||(now-lastTs)>DEB){lastCode=code;lastTs=now;flash();vibrate([60]);processScan(code);}
          }
        }catch{}
        setTimeout(loop,200);
      };loop();
    };document.head.appendChild(s);
  }
}

function flash(){const w=document.getElementById('cam-wrap');w.style.borderColor='var(--success)';setTimeout(()=>w.style.borderColor='var(--surface2)',700)}
function stopCamera(){detecting=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('video').srcObject=null;resetCam();}
function resetCam(){detecting=false;document.getElementById('btn-start').disabled=false;document.getElementById('btn-stop').disabled=true;document.getElementById('cam-wrap').classList.remove('scanning')}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('manual-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();manualScan()}});
  updateStats();
});
function manualScan(){const i=document.getElementById('manual-input');const c=i.value.trim();if(!c){showToast('Ingresá un código','error');return}i.value='';processScan(c);}

// ── ESCANEO ────────────────────────────────────────────
let currentPedidoIds=[];

async function processScan(code){
  setLoading(true);document.getElementById('result-card').classList.add('hidden');
  let pedido;
  try{pedido=await buscarPedido(code);}
  catch(e){setLoading(false);showResult({tipo:'error',cliente:code,badge:'❌ Sin conexión',meta:'',rows:[]});showToast('Error de red','error');return;}
  setLoading(false);
  if(!pedido){vibrate([200,100,200]);showResult({tipo:'error',cliente:code,badge:'❌ No encontrado',meta:'El código no está en la base de pedidos',rows:[]});showToast('No encontrado','error');return;}
  const dup=wasScannedToday(code);
  saveEscaneo(code,pedido);updateStats();
  currentPedidoIds=pedido.rows.map(r=>r.id);
  showResult({
    tipo:dup?'warning':'ok',
    cliente:pedido.cliente||pedido.nroFactura,
    badge:dup?'⚠️ Ya escaneado':'✅ Registrado',
    meta:[pedido.factura&&`Fact. ${pedido.factura}`,pedido.nroFactura&&`Nº ${pedido.nroFactura}`,
          pedido.ruta&&`Ruta ${pedido.ruta}`,pedido.zona&&`Zona ${pedido.zona}`].filter(Boolean).join(' · '),
    rows:pedido.rows,
  });
  dup?(vibrate([50,50,50]),showToast('⚠️ Ya escaneado','warning')):(vibrate([80]),showToast('✅ Registrado','success'));
}

// ── SUPABASE ───────────────────────────────────────────
async function buscarPedido(codigo){
  const intentos=[
    `pedidos?codigo_barras=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?nro_factura=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?cliente=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?negocio=eq.${enc(codigo)}&select=*&limit=1`,
    `pedidos?ord_compra=eq.${enc(codigo)}&select=*&limit=1`,
  ];
  let fila=null;
  for(const q of intentos){const r=await supaGet(q);if(r&&r.length){fila=r[0];break;}}
  if(!fila) return null;
  const todo=await supaGet(`pedidos?nro_factura=eq.${enc(fila.nro_factura)}&select=*&order=id`);
  return buildPedido(todo.length?todo:[fila]);
}

function buildPedido(rows){
  if(!rows||!rows.length) return null;
  const b=rows[0];
  return{
    nroFactura:b.nro_factura,factura:b.factura,
    cliente:b.cliente||b.negocio||b.nro_factura,
    ruta:b.ruta_cliente||b.ruta,zona:b.zona,rows:rows
  };
}

async function supaGet(path){
  const r=await fetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});
  if(!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function marcarSeparado(id,separado){
  await fetch(`${SUPA_URL}/rest/v1/pedidos?id=eq.${id}`,{
    method:'PATCH',
    headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({separado,separado_at:separado?new Date().toISOString():null})
  });
}

function enc(s){return encodeURIComponent(s)}

// ── UI ─────────────────────────────────────────────────
function setLoading(on){document.getElementById('loading').classList.toggle('hidden',!on)}

function showResult({tipo,cliente,badge,meta,rows}){
  const card=document.getElementById('result-card');
  card.className='result-card'+(tipo==='error'?' error':tipo==='warning'?' warning':'');
  document.getElementById('res-cliente').textContent=cliente;
  const b=document.getElementById('res-badge');
  b.textContent=badge;b.className='res-badge'+(tipo==='error'?' error':tipo==='warning'?' warning':'');
  document.getElementById('res-meta').textContent=meta;
  const list=document.getElementById('res-products');
  list.innerHTML='';
  if(!rows||!rows.length){
    list.innerHTML='<li style="color:var(--muted);padding:10px">Sin productos</li>';
  } else {
    rows.forEach(r=>{
      const li=document.createElement('li');
      li.className='prod-item'+(r.separado?' done':'');
      li.dataset.id=r.id;
      li.innerHTML=`<div class="chk">${r.separado?'✓':''}</div>
        <div class="prod-info">
          <div class="prod-name">${r.producto||'—'}</div>
          <div class="prod-cod">[${r.cod_producto||''}] ${r.codigo_barras||''}</div>
        </div>
        <span class="prod-qty">x${r.cantidad}</span>`;
      li.onclick=()=>toggleSeparado(li,r.id);
      list.appendChild(li);
    });
  }
  updateProgress(rows);
  document.getElementById('res-time').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  card.classList.remove('hidden');
}

async function toggleSeparado(li,id){
  const done=!li.classList.contains('done');
  li.classList.toggle('done',done);
  li.querySelector('.chk').textContent=done?'✓':'';
  // Actualizar progreso visualmente de inmediato
  const allItems=document.querySelectorAll('.prod-item');
  const total=allItems.length;
  const doneCount=[...allItems].filter(i=>i.classList.contains('done')).length;
  updateProgressNums(doneCount,total);
  // Guardar en Supabase
  await marcarSeparado(id,done);
}

function updateProgress(rows){
  if(!rows||!rows.length) return;
  const total=rows.length;
  const done=rows.filter(r=>r.separado).length;
  updateProgressNums(done,total);
}

function updateProgressNums(done,total){
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${done}/${total} separados`;
}

// ── STORAGE LOCAL ──────────────────────────────────────
function loadE(){try{return JSON.parse(localStorage.getItem(SCAN_KEY)||'[]')}catch{return[]}}
function saveEscaneo(code,p){
  const arr=loadE();
  arr.unshift({id:Date.now(),code,nroFactura:p.nroFactura,factura:p.factura,
    cliente:p.cliente,ruta:p.ruta,zona:p.zona,
    productos:p.rows.map(r=>({nombre:r.producto,cantidad:r.cantidad,separado:r.separado})),
    timestamp:new Date().toISOString()});
  localStorage.setItem(SCAN_KEY,JSON.stringify(arr.slice(0,500)));
}
function wasScannedToday(code){return loadE().some(r=>r.code===code&&r.timestamp.startsWith(todayStr()))}
function updateStats(){
  const hoy=loadE().filter(r=>r.timestamp.startsWith(todayStr()));
  document.getElementById('stat-hoy').textContent=hoy.length;
  document.getElementById('stat-ult').textContent=hoy.length?(hoy[0].cliente||'—').substring(0,12):'—';
}

// ── HISTORIAL ──────────────────────────────────────────
function toggleHistory(){const w=document.getElementById('hist-wrap');if(w.classList.toggle('open'))renderHistory()}
function renderHistory(){
  const data=loadE().filter(r=>r.timestamp.startsWith(todayStr()));
  const list=document.getElementById('hist-list');
  if(!data.length){list.innerHTML='<div class="empty">📭 Sin escaneos hoy</div>';return}
  list.innerHTML=data.map(r=>{
    const total=r.productos?.length||0;
    const done=r.productos?.filter(p=>p.separado).length||0;
    return`<div class="hi${done===total&&total?' hi-done':''}">
      <div class="hi-top"><span class="hi-cli">${r.cliente||r.nroFactura}</span><span class="hi-t">${fmtTime(r.timestamp)}</span></div>
      <div class="hi-m">Nº ${r.nroFactura||''} · ${r.ruta||''}</div>
      <div class="hi-m">${done}/${total} productos separados</div>
    </div>`;}).join('');
}

// ── UTILS ──────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtTime(iso){return new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p)}catch{}}
let _tt;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type}`;
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('hidden'),2800);
}
</script>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Riel Scanner</title>
  <!-- ZXing: lector de códigos de barras por cámara -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --primary:#0057ff;--primary-dark:#003dc2;
      --success:#00c853;--danger:#ff1744;--warning:#ff9100;
      --bg:#0a0a1a;--surface:#12122a;--surface2:#1e1e3f;
      --text:#f0f0ff;--muted:#8888aa;--radius:16px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:var(--bg);color:var(--text);min-height:100vh;
         display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

    /* HEADER */
    .header{width:100%;max-width:480px;display:flex;align-items:center;
            justify-content:space-between;margin-bottom:20px}
    .header h1{font-size:22px;font-weight:900}
    .header h1 span{color:var(--primary)}
    .btn-hist{background:var(--surface);border:none;color:var(--text);
              padding:10px 14px;border-radius:10px;font-size:18px;cursor:pointer}

    /* CÁMARA */
    .camera-wrap{width:100%;max-width:480px;position:relative;
                 border-radius:var(--radius);overflow:hidden;
                 background:#000;aspect-ratio:4/3;margin-bottom:16px;
                 border:2px solid var(--surface2)}
    #video{width:100%;height:100%;object-fit:cover;display:block}
    .scan-line{position:absolute;left:10%;right:10%;height:2px;
               background:var(--primary);box-shadow:0 0 8px var(--primary);
               animation:scanMove 2s ease-in-out infinite;top:50%}
    @keyframes scanMove{
      0%,100%{top:20%} 50%{top:80%}
    }
    .camera-overlay{position:absolute;inset:0;display:flex;
                    align-items:center;justify-content:center;
                    background:rgba(0,0,0,.6);flex-direction:column;gap:12px}
    .camera-overlay.hidden{display:none}
    .camera-overlay p{color:var(--muted);font-size:14px;text-align:center;padding:0 20px}

    /* BOTONES CÁMARA */
    .camera-controls{width:100%;max-width:480px;display:flex;gap:10px;margin-bottom:20px}
    .btn-cam{flex:1;padding:14px;border:none;border-radius:12px;
             font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
    .btn-start{background:var(--primary);color:#fff}
    .btn-start:active{background:var(--primary-dark)}
    .btn-stop{background:var(--surface);color:var(--text)}
    .btn-stop:disabled{opacity:.4}

    /* INPUT MANUAL */
    .manual-wrap{width:100%;max-width:480px;display:flex;gap:10px;margin-bottom:24px}
    .manual-input{flex:1;background:var(--surface);border:2px solid var(--surface2);
                  border-radius:12px;color:var(--text);font-size:16px;font-weight:600;
                  padding:13px 16px;outline:none;letter-spacing:1px}
    .manual-input:focus{border-color:var(--primary)}
    .manual-input::placeholder{color:var(--muted);font-size:13px;font-weight:400;letter-spacing:0}
    .btn-manual{background:var(--primary);color:#fff;border:none;border-radius:12px;
                padding:13px 18px;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap}
    .btn-manual:active{background:var(--primary-dark)}

    /* RESULTADO */
    .result-card{width:100%;max-width:480px;border-radius:var(--radius);
                 padding:22px 20px;border:2px solid var(--success);
                 background:rgba(0,200,83,.07);animation:slideIn .3s ease;margin-bottom:20px}
    .result-card.error  {border-color:var(--danger); background:rgba(255,23,68,.07)}
    .result-card.warning{border-color:var(--warning);background:rgba(255,145,0,.07)}
    .result-card.hidden{display:none}
    @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    .result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .result-cliente{font-size:22px;font-weight:900;line-height:1.2}
    .result-badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;
                  background:var(--success);color:#000;white-space:nowrap;margin-left:8px;flex-shrink:0}
    .result-badge.error  {background:var(--danger);color:#fff}
    .result-badge.warning{background:var(--warning);color:#000}

    .result-meta{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7}

    .products-label{font-size:11px;font-weight:700;text-transform:uppercase;
                    letter-spacing:1px;color:var(--muted);margin-bottom:10px}
    .products-list{list-style:none;display:flex;flex-direction:column;gap:7px}
    .products-list li{background:var(--surface2);border-radius:10px;padding:11px 14px;
                      font-size:15px;display:flex;justify-content:space-between;align-items:center}
    .prod-code{font-size:11px;color:var(--muted);margin-right:6px}
    .prod-qty{background:var(--primary);color:#fff;border-radius:6px;
              padding:2px 10px;font-size:13px;font-weight:700;flex-shrink:0}
    .result-time{margin-top:12px;font-size:12px;color:var(--muted);text-align:right}

    /* LOADING */
    .loading{width:100%;max-width:480px;display:flex;align-items:center;
             justify-content:center;gap:12px;padding:20px;color:var(--muted);font-size:15px}
    .loading.hidden{display:none}
    .spinner{width:22px;height:22px;border:3px solid var(--surface2);
             border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* HISTORIAL */
    .history-wrap{width:100%;max-width:480px;display:none}
    .history-wrap.open{display:block}
    .history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .history-header h2{font-size:17px;font-weight:800}
    .btn-close-hist{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer}
    .history-list{display:flex;flex-direction:column;gap:10px}
    .hist-item{background:var(--surface);border-radius:var(--radius);
               padding:14px 16px;border-left:4px solid var(--primary)}
    .hist-top{display:flex;justify-content:space-between;margin-bottom:5px}
    .hist-cliente{font-weight:800;font-size:15px}
    .hist-time{font-size:12px;color:var(--muted)}
    .hist-meta{font-size:13px;color:var(--muted)}
    .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:15px}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
           padding:13px 26px;border-radius:30px;font-weight:700;font-size:15px;
           z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:toastIn .25s ease}
    .toast.hidden{display:none}
    .toast.success{background:var(--success);color:#000}
    .toast.error  {background:var(--danger); color:#fff}
    .toast.warning{background:var(--warning);color:#000}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}
                       to  {opacity:1;transform:translateX(-50%) translateY(0)}}

    /* STATS BAR */
    .stats-bar{width:100%;max-width:480px;display:flex;gap:10px;margin-bottom:20px}
    .stat{flex:1;background:var(--surface);border-radius:12px;padding:14px;text-align:center;border:2px solid var(--surface2)}
    .stat-n{display:block;font-size:28px;font-weight:900;color:var(--primary)}
    .stat-l{font-size:11px;color:var(--muted);font-weight:600}
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>🏭 Riel <span>Scanner</span></h1>
    <button class="btn-hist" onclick="toggleHistory()" title="Historial">📋</button>
  </div>

  <!-- CÁMARA -->
  <div class="camera-wrap">
    <video id="video" playsinline muted></video>
    <div class="scan-line" id="scan-line" style="display:none"></div>
    <div class="camera-overlay" id="cam-overlay">
      <span style="font-size:48px">📷</span>
      <p>Presioná <strong style="color:#fff">Activar cámara</strong> para escanear</p>
    </div>
  </div>

  <div class="camera-controls">
    <button class="btn-cam btn-start" id="btn-start" onclick="startCamera()">📷 Activar cámara</button>
    <button class="btn-cam btn-stop"  id="btn-stop"  onclick="stopCamera()" disabled>⏹ Detener</button>
  </div>

  <!-- MANUAL -->
  <div class="manual-wrap">
    <input type="text" id="manual-input" class="manual-input"
           placeholder="O ingresá el código manualmente..."
           autocomplete="off"/>
    <button class="btn-manual" onclick="manualScan()">OK</button>
  </div>

  <!-- LOADING -->
  <div class="loading hidden" id="loading">
    <div class="spinner"></div> Buscando pedido...
  </div>

  <!-- RESULTADO -->
  <div id="result-card" class="result-card hidden">
    <div class="result-top">
      <div class="result-cliente" id="res-cliente"></div>
      <div class="result-badge"   id="res-badge"></div>
    </div>
    <div class="result-meta" id="res-meta"></div>
    <div class="products-label">Productos</div>
    <ul class="products-list" id="res-products"></ul>
    <div class="result-time" id="res-time"></div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-n" id="stat-hoy">0</span><span class="stat-l">Hoy</span></div>
    <div class="stat"><span class="stat-n" id="stat-last">—</span><span class="stat-l">Último</span></div>
  </div>

  <!-- HISTORIAL -->
  <div class="history-wrap" id="history-wrap">
    <div class="history-header">
      <h2>📋 Historial del día</h2>
      <button class="btn-close-hist" onclick="toggleHistory()">✕ Cerrar</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
